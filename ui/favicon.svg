<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- paper: a front page at 16px -->
  <rect width="64" height="64" fill="#f5f0e3"/>
  <!-- masthead double rule -->
  <rect x="7" y="9"  width="50" height="3"   fill="#1c1712"/>
  <rect x="7" y="14.5" width="50" height="1.4" fill="#1c1712"/>
  <!-- headline block -->
  <rect x="7" y="21" width="33" height="7" fill="#1c1712"/>
  <!-- photograph (red seal) -->
  <rect x="44" y="21" width="13" height="16" fill="#a32c26"/>
  <!-- left column body lines -->
  <rect x="7" y="33" width="33" height="2.2" fill="#1c1712" opacity=".78"/>
  <rect x="7" y="38" width="29" height="2.2" fill="#1c1712" opacity=".78"/>
  <rect x="7" y="43" width="33" height="2.2" fill="#1c1712" opacity=".78"/>
  <rect x="7" y="48" width="24" height="2.2" fill="#1c1712" opacity=".78"/>
  <!-- right column under the photo -->
  <rect x="44" y="42" width="13" height="2.2" fill="#1c1712" opacity=".78"/>
  <rect x="44" y="47" width="10" height="2.2" fill="#1c1712" opacity=".78"/>
  <!-- bottom rule -->
  <rect x="7" y="54.5" width="50" height="1.4" fill="#1c1712"/>
</svg>
